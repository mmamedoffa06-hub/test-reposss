<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

        <h2>Qeydiyyat Formu</h2>

    <form>
        <label for="name">Ad:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="password">Şifrə:</label><br>
        <input type="password" id="password" name="password"><br><br>

        <label for="age">Yaş:</label><br>
        <input type="number" id="age" name="age"><br><br>

        <label for="date">Doğum tarixi:</label><br>
        <input type="date" id="date" name="date"><br><br>

        <label for="about">Haqqında:</label><br>
        <textarea id="about" name="about" rows="4" cols="30"></textarea><br><br>

        <label for="city">Şəhər seçimi:</label><br>
        <select id="city" name="city">
            <option>Bakı</option>
            <option>Gəncə</option>
            <option>Sumqayıt</option>
        </select><br><br>

        <label>Cins:</label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Kişi</label><br>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Qadın</label><br><br>

        <label>Maraqlar:</label><br>
        <input type="checkbox" id="music" name="interest" value="music">
        <label for="music">Musiqi</label><br>

        <input type="checkbox" id="sports" name="interest" value="sports">
        <label for="sports">İdman</label><br>

        <input type="checkbox" id="reading" name="interest" value="reading">
        <label for="reading">Kitab oxumaq</label><br><br>

        <input type="submit" value="Göndər">
        <input type="reset" value="Təmizlə">

    </form>

    
</body>
</html>
